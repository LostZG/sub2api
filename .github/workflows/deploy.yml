name: Build and Deploy

# ============================================================================
# Sub2API GitHub Actions 部署工作流
# ============================================================================
# 触发:Actions 页面手动触发(选 main 分支会部署生产;选 dev 等分支只构建镜像不部署)
# 镜像 tag:main → :latest(供生产拉取);其他分支 → :<分支名>(如 :dev),绝不覆盖 :latest
# 流程:在 GitHub amd64 runner 原生构建(不用 QEMU)→ 推送 GHCR → (仅 main) SSH 部署
#
# 需要配置的 Secrets(Settings → Secrets and variables → Actions):
#   SSH_HOST          服务器 IP(如 154.9.26.43)
#   SSH_PORT          SSH 端口(如 22022)
#   SSH_USER          SSH 用户(如 root)
#   SSH_PRIVATE_KEY   本地 ~/.ssh/id_ed25519 的完整内容(私钥)
#   DEPLOY_PATH       服务器部署目录(如 /root/sub2api)
# ============================================================================

on:
  workflow_dispatch:  # 只手动触发,不在 push 时自动跑

# 同一分支新的构建会取消旧的,避免重复部署
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 推送 GHCR 需要的权限
    timeout-minutes: 30

    steps:
      # ============ 准备 ============
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name and tags
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/${OWNER}/sub2api" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_ENV
          # main 分支打 :latest(供生产拉取);其他分支打 :<分支名>(如 :dev),绝不污染 :latest
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "PRIMARY_TAG=latest" >> $GITHUB_ENV
          else
            echo "PRIMARY_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      # ============ 构建 ============
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # Actions 自动提供,不用额外配

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.PRIMARY_TAG }}
            ${{ env.IMAGE }}:${{ env.SHORT_SHA }}
          build-args: |
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ============ 部署 ============
      - name: Deploy to server
        if: github.ref == 'refs/heads/main'  # 仅 main 分支部署生产,dev 等分支只出镜像
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            echo "Pulling latest image..."
            docker compose -f docker-compose.local.yml -f docker-compose.override.yml pull
            echo "Restarting containers..."
            docker compose -f docker-compose.local.yml -f docker-compose.override.yml up -d --remove-orphans
            echo "Container status:"
            docker compose -f docker-compose.local.yml -f docker-compose.override.yml ps

      - name: Health check
        if: github.ref == 'refs/heads/main'  # 仅 main 分支做生产健康检查
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 10
            for i in 1 2 3 4 5 6; do
              if curl -fsS http://localhost:8080/health; then
                echo ""
                echo "✅ Health check passed"
                exit 0
              fi
              echo "Attempt $i failed, retrying in 10s..."
              sleep 10
            done
            echo "❌ Health check failed"
            docker compose -f ${{ secrets.DEPLOY_PATH }}/docker-compose.local.yml -f ${{ secrets.DEPLOY_PATH }}/docker-compose.override.yml logs --tail=50 sub2api
            exit 1
